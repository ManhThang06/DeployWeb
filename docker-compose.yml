# docker-compose.yml
services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: note-app
    container_name: note-app-container
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - vendor_data:/var/www/vendor
      - node_modules_data:/var/www/node_modules
    networks:
      - app-network

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: note-web-container
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: note-db-container
    restart: unless-stopped
    tty: true
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: user
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: note-phpmyadmin-container
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - app-network

  # Reverb Service (Broadcasting)
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    image: note-app
    container_name: note-reverb-container
    restart: unless-stopped
    depends_on:
      - app
      - db
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - vendor_data:/var/www/vendor
      - node_modules_data:/var/www/node_modules
    environment:
      SERVICE_NAME: reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  vendor_data:
  node_modules_data:
